name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Get code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Build Docker Image
    - name: Build Docker Image
      run: docker build -t ramalkhan/initial:latest .

    # 3. Test (Run container)
    - name: Run Container Test
      run: docker run -d -p 3000:3000 ramalkhan/initial:latest

    # 4. Login to Docker Hub
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 5. Push Image
    - name: Push to Docker Hub
      run: docker push ramalkhan/initial:latest

    # 6. Deploy to EC2 (optional)
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ramalkhan/initial:latest
          docker stop app || true
          docker rm app || true
          docker run -d -p 80:3000 --name app ramalkhan/initial:latest