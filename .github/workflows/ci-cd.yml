name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Get code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. DEBUG SECRETS (Check this first in your logs!)
    - name: Debug Secrets
      run: |
        if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then 
          echo "ERROR: DOCKER_USERNAME is EMPTY. Check your GitHub Settings -> Secrets."
          exit 1
        else 
          echo "SUCCESS: DOCKER_USERNAME is detected."
        fi

    # 3. Login to Docker Hub (Do this before building)
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 4. Build Docker Image
    - name: Build Docker Image
      run: docker build -t ramalkhan/initial:latest .

    # 5. Test (Run container)
    - name: Run Container Test
      run: docker run -d -p 3000:3000 ramalkhan/initial:latest

    # 6. Push Image
    - name: Push to Docker Hub
      run: docker push ramalkhan/initial:latest

    # 7. Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ramalkhan/initial:latest
          docker stop app || true
          docker rm app || true
          docker run -d -p 80:3000 --name app ramalkhan/initial:latest